name: Deploy WaafiBook to Hostinger VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── SSH into VPS, pull code, build, cache ──────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.124.217.111
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/waafibook

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Composer ==="
            composer install --no-dev --optimize-autoloader --no-interaction --quiet

            echo "=== Building frontend assets ==="
            npm ci --prefer-offline 2>/dev/null || npm install --silent
            npm run build

            echo "=== Migrations ==="
            php artisan migrate --force

            echo "=== Cache rebuild ==="
            php artisan config:clear && php artisan config:cache
            php artisan route:clear
            php artisan view:clear   && php artisan view:cache

            echo "=== Permissions ==="
            chmod -R 775 storage bootstrap/cache
            chmod -R 755 public

            echo "=== Deployment complete ==="

      # ── Bust OPcache ───────────────────────────────────────────────────────
      - name: Reset OPcache
        run: |
          curl -fsS "https://ims.thehorntech.com/opcache-clear.php?token=horntech-deploy-cache-bust-7f3a91" || true
